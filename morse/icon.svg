<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="28" fill="#111"/>
  <!-- Title "CW" hint: Morse pattern for K (dash-dot-dash) -->
  <rect x="20" y="60" width="46" height="18" rx="9" fill="#00ff00"/>
  <circle cx="84" cy="69" r="9" fill="#00ff00"/>
  <rect x="104" y="60" width="46" height="18" rx="9" fill="#00ff00"/>
  <!-- Morse pattern for M (dash-dash) -->
  <rect x="20" y="96" width="64" height="18" rx="9" fill="#00ff00"/>
  <rect x="100" y="96" width="64" height="18" rx="9" fill="#00ff00"/>
  <!-- Decorative bottom row: dot-dot-dot (S) -->
  <circle cx="36" cy="141" r="9" fill="#00cc00"/>
  <circle cx="72" cy="141" r="9" fill="#00cc00"/>
  <circle cx="108" cy="141" r="9" fill="#00cc00"/>
</svg>
